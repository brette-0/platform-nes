version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.11"
  apt_packages:
    - doxygen
    - graphviz
  jobs:
    pre_build:
      - cd docs && doxygen Doxyfile.api
      - cd docs && doxygen Doxyfile.advanced

sphinx:
  configuration: docs/conf.py
  fail_on_warning: false

python:
  install:
    - requirements: docs/requirements.txt

formats:
  - pdf
  - htmlzip
